<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秋秋次元</title>

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 导航栏 -->
    <header class="navbar">
        <div class="logo">
            <h1>
                <a href="#" title="秋秋次元">秋秋次元首页</a>
            </h1>
        </div>
        <div class="navbaraction">
            <button class="btn" id="love">💖 我的收藏</button>
            <button class="btn" id="dark">🌓 主题切换</button>
        </div>
    </header>

    <!-- 轮播图 -->
    <!-- section是有主题的区块 -->
    <!-- 先用三个slide占位，后续js补上 -->
    <!-- carousel是轮播图区域最外层容器，all-slides是轨道，slide是占位的静态页面 
     用img不用bg是在html时就可以加载出来  caption是文字说明-->
    <section class="carousel">
        <div class="all-slides">
            <div class="slide1 slide">
                <img src="image/1.jpeg" alt="">
                <div class="caption">孤独摇滚</div>
            </div>
            <div class="slide2 slide">
                <div class="slide1 slide">
                    <img src="image/1.jpeg" alt="">
                    <div class="caption">孤独摇滚</div>
                </div>
            </div>
            <div class="slide3 slide">
                <div class="slide1 slide">
                    <img src="image/1.jpeg" alt="">
                    <div class="caption">孤独摇滚</div>
                </div>
            </div>
        </div>

        <button class="carousel-btn prev">&#10094;</button>
        <button class="carousel-btn next">&#10095;</button>

        <div class="dots">
            <div class="dot dot1"></div>
            <div class="dot dot2"></div>
            <div class="dot dot3"></div>
        </div>
    </section>
</body>

</html>
